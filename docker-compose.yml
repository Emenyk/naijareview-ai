services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_NAME: "NaijaReview AI"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: naija_review
      DB_USERNAME: naija
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage/logs
    command: >
      sh -c "
        php artisan key:generate --force &&
        php artisan migrate --force &&
        /usr/bin/supervisord -c /etc/supervisord.conf
      "

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: naija_review
      MYSQL_USER: naija
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unaija", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  app_storage:
